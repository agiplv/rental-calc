<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#0f172a" />
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="PEA Rental Calc">
  <link rel="manifest" href="./manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png">
  <title>PEA Rental Calc</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@3.4.1/dist/tailwind.min.css" rel="stylesheet">
  <style>
    html, body { height: 100%; margin: 0; padding: 0; }
    body { min-height: 100vh; background: #0f172a; color: #f1f5f9; font-family: system-ui, sans-serif; }
    .safe-area { padding-bottom: env(safe-area-inset-bottom); }
    input, button, select, textarea { font-size: 1.1rem; }
    input:focus, button:focus { outline: 2px solid #2563eb; outline-offset: 2px; }
    ::selection { background: #2563eb33; }
  </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex flex-col">
  <div class="safe-area flex-1 flex flex-col">
    <pea-app></pea-app>
  </div>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
